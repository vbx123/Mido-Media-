<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MIDO MEDIA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            /* وضع النهار (Default) */
            --bg: #ffffff;
            --text: #000000;
            --accent: #FFD700; /* أصفر ذهبي */
            --card-bg: #f9f9f9;
            --border: #eeeeee;
        }

        [data-theme="dark"] {
            /* وضع الليل */
            --bg: #000000;
            --text: #FFD700; /* نصوص صفراء */
            --accent: #ffffff; /* حدود بيضاء */
            --card-bg: #111111;
            --border: #333333;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.3s, color 0.3s;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding-top: 70px; /* للبار العلوي */
            padding-bottom: 60px; /* للبار السفلي */
            overflow-x: hidden;
        }

        /* البار العلوي */
        .top-bar {
            position: fixed;
            top: 0; width: 100%; height: 60px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            z-index: 1000;
        }

        .logo-box img {
            height: 40px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        .top-icons i { font-size: 22px; cursor: pointer; margin-left: 15px; }

        /* الجملة الترحيبية */
        .welcome-section {
            text-align: center;
            padding: 20px;
            margin-top: 10px;
        }

        .welcome-section h1 {
            font-family: 'cursive', 'Cairo'; /* محاكاة الرقعة */
            font-size: 24px;
            margin: 0;
        }

        /* شبكة الأقسام */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 15px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px 10px;
            text-align: center;
            text-decoration: none;
            color: var(--text);
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            will-change: transform;
        }

        .card:active { transform: scale(0.95); background: var(--border); }

        .card.special {
            grid-column: span 2;
            border: 2px solid var(--accent);
            background: linear-gradient(45deg, var(--card-bg), var(--bg));
        }

        .card i { font-size: 28px; color: var(--accent); }

        /* قسم التعريف والسوشيال */
        .info-section {
            padding: 20px;
            margin: 20px 15px;
            border-radius: 15px;
            background: var(--card-bg);
            border: 1px solid var(--border);
        }

        .social-row {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }

        .social-item {
            text-align: center;
            text-decoration: none;
            color: var(--text);
            font-size: 12px;
        }

        .social-item i {
            display: block;
            font-size: 30px;
            margin-bottom: 5px;
        }

        /* البار السفلي */
        .bottom-bar {
            position: fixed;
            bottom: 0; width: 100%;
            height: 50px;
            background: var(--bg);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            z-index: 1000;
        }

        /* مودال الديالوج */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: var(--bg);
            width: 85%;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid var(--accent);
        }

        /* Iframe للموقع الخارجي */
        #external-frame-container {
            position: fixed;
            top: 60px; bottom: 0; left: 0; right: 0;
            background: var(--bg);
            display: none;
            z-index: 900;
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* Skeleton Loading */
        .skeleton {
            background: #eee;
            background: linear-gradient(110deg, #ececec 8%, #f5f5f5 18%, #ececec 33%);
            background-size: 200% 100%;
            animation: 1.5s shine linear infinite;
        }
        @keyframes shine { to { background-position-x: -200%; } }

    </style>
</head>
<body data-theme="light">

    <div class="top-bar">
        <i class="fa-solid fa-bars" onclick="toggleMenu()"></i>
        <div class="logo-box">
            <img src="logo.png" id="mainLogo" alt="Logo">
        </div>
        <div class="top-icons">
            <i class="fa-solid fa-moon" id="themeBtn" onclick="toggleTheme()"></i>
        </div>
    </div>

    <div id="main-content">
        <div class="welcome-section">
            <h1 id="welcomeText">...</h1>
        </div>

        <div class="grid-container" id="grid">
            </div>

        <div class="info-section">
            <h3 id="aboutTitle">...</h3>
            <p id="aboutText" style="font-size: 14px; opacity: 0.8;"></p>
            <div class="social-row" id="socialBox"></div>
        </div>
    </div>

    <div id="external-frame-container">
        <iframe id="extFrame" src=""></iframe>
    </div>

    <div class="bottom-bar">
        جميع الحقوق محفوظة © <span id="footerName"></span>
    </div>

    <div class="modal" id="autoModal">
        <div class="modal-content">
            <h3>تابعنا الآن</h3>
            <p>اشترك في قنواتنا لتصلك أحدث العروض</p>
            <div id="modalSocials"></div>
            <button onclick="closeModal()" style="margin-top: 20px; background: var(--accent); border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer;">إغلاق</button>
        </div>
    </div>

<script>
    let config = {};

    async function loadConfig() {
        try {
            const res = await fetch('config.json?v=' + Date.now());
            config = await res.json();
            setupSite();
        } catch (e) { console.error("Config Load Failed"); }
    }

    function setupSite() {
        document.getElementById('welcomeText').innerText = config.welcomeMsg;
        document.getElementById('aboutTitle').innerText = config.aboutUs.title;
        document.getElementById('aboutText').innerText = config.aboutUs.content;
        document.getElementById('footerName').innerText = config.siteName;

        // توليد الأقسام
        const grid = document.getElementById('grid');
        grid.innerHTML = config.sections.map(s => `
            <a href="#" class="card ${s.type === 'special' ? 'special' : ''}" onclick="handleNav('${s.id}', '${s.link}', '${s.type}')">
                <i>${s.icon}</i>
                <span>${s.title}</span>
            </a>
        `).join('');

        // توليد أيقونات السوشيال
        const socialHtml = `
            <a href="${config.socialLinks.whatsapp}" class="social-item"><i class="fab fa-whatsapp" style="color:#25D366"></i>واتساب</a>
            <a href="${config.socialLinks.telegram}" class="social-item"><i class="fab fa-telegram" style="color:#0088cc"></i>تليجرام</a>
            <a href="${config.socialLinks.facebook}" class="social-item"><i class="fab fa-facebook" style="color:#1877F2"></i>فيسبوك</a>
        `;
        document.getElementById('socialBox').innerHTML = socialHtml;
        document.getElementById('modalSocials').innerHTML = socialHtml;

        // ظهور الديالوج بعد 3 ثواني
        setTimeout(() => {
            if(!sessionStorage.getItem('modalShown')) {
                document.getElementById('autoModal').style.display = 'flex';
                sessionStorage.setItem('modalShown', 'true');
            }
        }, 3000);
    }

    function handleNav(id, link, type) {
        if(type === 'external') {
            document.getElementById('extFrame').src = config.externalServiceUrl;
            document.getElementById('external-frame-container').style.display = 'block';
            document.getElementById('main-content').style.display = 'none';
        } else {
            window.location.href = link;
        }
    }

    // تبديل الثيم
    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('themeBtn');
        if (body.getAttribute('data-theme') === 'light') {
            body.setAttribute('data-theme', 'dark');
            btn.className = 'fa-solid fa-sun';
            localStorage.setItem('theme', 'dark');
        } else {
            body.setAttribute('data-theme', 'light');
            btn.className = 'fa-solid fa-moon';
            localStorage.setItem('theme', 'light');
        }
    }

    // حفظ الثيم عند التحميل
    if(localStorage.getItem('theme') === 'dark') {
        document.body.setAttribute('data-theme', 'dark');
        document.getElementById('themeBtn').className = 'fa-solid fa-sun';
    }

    function closeModal() { document.getElementById('autoModal').style.display = 'none'; }
    function toggleMenu() { alert("القائمة الجانبية سيتم برمجتها عند تحديد الصفحات"); }

    loadConfig();
</script>
</body>
  </html>
